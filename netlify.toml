[build]
  publish = "."
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "18"

[[redirects]]
  from = "https://riyaka.art/*"
  to = "https://riyakadev.com/:splat"
  status = 301
  force = true

[[redirects]]
  from = "http://riyaka.art/*"
  to = "https://riyakadev.com/:splat"
  status = 301
  force = true

[[redirects]]
  from = "https://www.riyaka.art/*"
  to = "https://riyakadev.com/:splat"
  status = 301
  force = true

[[redirects]]
  from = "http://www.riyaka.art/*"
  to = "https://riyakadev.com/:splat"
  status = 301
  force = true

[[redirects]]
  from = "http://riyakadev.com/*"
  to = "https://riyakadev.com/:splat"
  status = 301
  force = true

[[redirects]]
  from = "http://www.riyakadev.com/*"
  to = "https://riyakadev.com/:splat"
  status = 301
  force = true

[[redirects]]
  from = "https://www.riyakadev.com/*"
  to = "https://riyakadev.com/:splat"
  status = 301
  force = true

# Canonical index URLs (avoid duplicate /index.html vs /)
[[redirects]]
  from = "/index.html"
  to = "/"
  status = 301
  force = true

[[redirects]]
  from = "/blog/index.html"
  to = "/blog/"
  status = 301
  force = true

[[redirects]]
  from = "/tools/index.html"
  to = "/tools/"
  status = 301
  force = true

[[headers]]
  for = "/.netlify/functions/*"
  [headers.values]
    Access-Control-Allow-Origin = "*"
    Access-Control-Allow-Headers = "Content-Type"
    Access-Control-Allow-Methods = "POST, OPTIONS"

















